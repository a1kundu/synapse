name: Build & Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      BUILD_TYPE: ${{ inputs.build_type || 'debug' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract metadata
        id: meta
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "build_number=$(git rev-list --count HEAD)" >> $GITHUB_OUTPUT
          echo "build_type=${{ env.BUILD_TYPE }}" >> $GITHUB_OUTPUT

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Stamp version
        run: |
          VERSION="${{ steps.meta.outputs.build_number }}.0.0-${{ steps.meta.outputs.sha_short }}"
          sed -i "s/APP_VERSION_PLACEHOLDER/$VERSION/g" composeApp/src/commonMain/kotlin/in/arijitk/synapse/Version.kt
          echo "Stamped version: $VERSION"

      - name: Decode keystore
        if: env.HAS_KEYSTORE == 'true'
        env:
          HAS_KEYSTORE: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > composeApp/release-keystore.jks
          echo "Keystore size: $(wc -c < composeApp/release-keystore.jks) bytes"

      - name: Create key.properties
        if: env.HAS_KEYSTORE == 'true'
        env:
          HAS_KEYSTORE: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          printf 'storeFile=release-keystore.jks\nstorePassword=%s\nkeyAlias=%s\nkeyPassword=%s\n' \
            "${{ secrets.KEYSTORE_PASSWORD }}" \
            "${{ secrets.KEY_ALIAS }}" \
            "${{ secrets.KEY_PASSWORD }}" \
            > composeApp/key.properties

      - name: Generate changelog
        id: changelog
        run: |
          # Find the previous tag for this channel
          CHANNEL="${{ env.BUILD_TYPE }}"
          PREV_TAG=$(git tag --list "v*-${CHANNEL}-*" --sort=-version:refname | head -n 1)

          if [ -z "$PREV_TAG" ]; then
            CHANGELOG=$(git log --oneline -20)
          else
            CHANGELOG=$(git log --oneline ${PREV_TAG}..HEAD)
          fi

          # Escape for GitHub Actions
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "changelog<<$EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

      - name: Build APK (${{ env.BUILD_TYPE }})
        run: |
          VERSION="${{ steps.meta.outputs.build_number }}.0.0-${{ steps.meta.outputs.sha_short }}"
          BUILD_NUM="${{ steps.meta.outputs.build_number }}"
          if [ "${{ env.BUILD_TYPE }}" = "release" ]; then
            ./gradlew :composeApp:assembleRelease \
              -Papp.versionCode="$BUILD_NUM" \
              -Papp.versionName="$VERSION"
          else
            ./gradlew :composeApp:assembleDebug \
              -Papp.versionCode="$BUILD_NUM" \
              -Papp.versionName="$VERSION"
          fi

      - name: Rename APK
        id: apk
        run: |
          BUILD_TYPE="${{ env.BUILD_TYPE }}"
          VERSION="${{ steps.meta.outputs.build_number }}.0.0-${{ steps.meta.outputs.sha_short }}"

          # Find the APK dynamically (handles signed/unsigned variants)
          APK_PATH=$(find composeApp/build/outputs/apk -name "*.apk" -type f | head -1)

          if [ -z "$APK_PATH" ]; then
            echo "ERROR: No APK found in composeApp/build/outputs/apk/"
            find composeApp/build/outputs/ -type f || true
            exit 1
          fi

          echo "Found APK: $APK_PATH"
          FINAL_NAME="synapse-${BUILD_TYPE}-${VERSION}.apk"
          mv "$APK_PATH" "$FINAL_NAME"
          echo "apk_name=$FINAL_NAME" >> $GITHUB_OUTPUT
          echo "apk_path=$FINAL_NAME" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.meta.outputs.build_number }}-${{ env.BUILD_TYPE }}-${{ steps.meta.outputs.sha_short }}
          name: "Build #${{ steps.meta.outputs.build_number }} — Synapse (${{ env.BUILD_TYPE }})"
          body: |
            **${{ env.BUILD_TYPE }}** APK built from commit `${{ github.sha }}`
            Version: `${{ steps.meta.outputs.build_number }}.0.0-${{ steps.meta.outputs.sha_short }}` (code: ${{ steps.meta.outputs.build_number }})
            Branch: `${{ github.ref_name }}`
            Triggered by: `${{ github.actor }}`

            ### Changelog
            ${{ steps.changelog.outputs.changelog }}
          files: ${{ steps.apk.outputs.apk_path }}
